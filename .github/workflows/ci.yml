name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      database:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_PASSWORD: "!ChangeMe!"
          POSTGRES_USER: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -d app_test -U app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, intl, zip

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations
        env:
          DATABASE_URL: "postgresql://app:!ChangeMe!@127.0.0.1:5432/app_test?serverVersion=16&charset=utf8"
          APP_ENV: test
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run tests
        env:
          DATABASE_URL: "postgresql://app:!ChangeMe!@127.0.0.1:5432/app_test?serverVersion=16&charset=utf8"
          APP_ENV: test
        run: php bin/phpunit